#Changing Prefix Key
unbind C-b
set -g prefix C-s
bind-key -r C-s send-prefix


#Force reload of config file
unbind r
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"


# quick pane cycling
unbind C-a
bind-key -r  C-a select-pane -t :.+

#Removing recursive pane switching
unbind Up
unbind Down
unbind Left
unbind Right

bind-key Up select-pane -U
bind-key Down select-pane -D
bind-key Left select-pane -L
bind-key Right select-pane -R

# Toggle status bar
bind-key b set -g status

#Respawn pane when unresponsive
bind-key C-k respawnp -k \; display-message "Pane Respawned..!!" 

# For image.nvim
set-option -g allow-passthrough on

#To prevent garbage characters from being printed while copying
set-option -g set-clipboard off

#Display setting (part of some external config)
set-option -g default-terminal "tmux-256color"
# set-option -g status-keys "emacs"
#
# set-option -g status-left-length 50
#
# set-option -g status-right " #(battery -t)  #(date '+%a, %b %d - %I:%M') "

run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g @catppuccin_window_text " #{b:pane_current_command}"
set -g @catppuccin_window_current_text " #{b:pane_current_command}"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set-option -g status-position top

# ensure escape doesn't cause issues with neovim
set -s escape-time 0

# set terminal window titles
set-option -g set-titles on
set-option -g set-titles-string "#S"

# Enable mouse
set -g mouse on
set -g @yank_selection_mouse 'clipboard'

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
